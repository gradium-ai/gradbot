<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="static/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradbot Voice Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --ink-soft: #444;
            --ink-faint: #666;
            --surface: #faf9f7;
            --surface-raised: #fff;
            --accent: #2a2a2a;
            --accent-hover: #000;
            --border: #e8e6e1;
            --border-light: #f0eee9;
            --danger: #c44;
            --active: #2d8a4e;
            --border-hover: #c5c2bc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--surface);
            background-image:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(210,200,185,0.25) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 80% 100%, rgba(190,200,210,0.15) 0%, transparent 60%);
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-family: 'Instrument Serif', serif;
            font-weight: 400;
            font-size: 2.75rem;
            letter-spacing: -0.02em;
            line-height: 1.1;
            color: var(--ink);
            margin-bottom: 0.5rem;
        }

        .header p {
            font-family: 'Instrument Serif', serif;
            font-style: italic;
            font-size: 1.0625rem;
            color: var(--ink-faint);
            font-weight: 400;
            letter-spacing: 0.005em;
        }

        .header::after {
            content: '';
            display: block;
            width: 32px;
            height: 1.5px;
            background: var(--border);
            margin: 1.25rem auto 0;
        }

        /* Orb — the main interaction point */
        .orb-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.75rem;
        }

        .orb-wrap {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 1.25rem;
        }

        /* Outer glow layer */
        .orb-glow {
            position: absolute;
            inset: -16px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,0,0,0.03) 40%, transparent 70%);
            transition: background 0.5s;
            pointer-events: none;
        }

        .orb-wrap.active .orb-glow {
            background: radial-gradient(circle, rgba(45,138,78,0.12) 30%, transparent 70%);
            animation: glow-pulse 2.5s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.06); }
        }

        .orb-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            transition: border-color 0.4s, transform 0.4s;
        }

        .orb-wrap.active .orb-ring {
            border-color: var(--active);
            animation: orb-breathe 2.5s ease-in-out infinite;
        }

        @keyframes orb-breathe {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.06); opacity: 0.5; }
        }

        .orb-btn {
            position: absolute;
            inset: 14px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #333, #1a1a1a);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s, transform 0.15s, box-shadow 0.3s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15), 0 1px 4px rgba(0,0,0,0.1);
        }

        .orb-btn:hover {
            background: linear-gradient(145deg, #444, #222);
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2), 0 2px 6px rgba(0,0,0,0.12);
        }
        .orb-btn:active { transform: scale(0.97); }

        .orb-btn.recording {
            background: linear-gradient(145deg, #d65, #b33);
            box-shadow: 0 4px 20px rgba(204,68,68,0.3), 0 1px 4px rgba(204,68,68,0.15);
        }
        .orb-btn.recording:hover {
            background: linear-gradient(145deg, #c55, #a22);
            box-shadow: 0 6px 24px rgba(204,68,68,0.4), 0 2px 6px rgba(204,68,68,0.2);
        }
        .orb-btn svg { transition: opacity 0.2s; }

        .orb-status {
            font-size: 0.875rem;
            color: var(--ink-soft);
            letter-spacing: 0.03em;
            min-height: 1.2em;
            transition: color 0.3s;
        }

        .orb-status.active { color: var(--active); }
        .orb-status.error { color: var(--danger); }

        /* Controls row — beneath orb */
        .controls-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 340px;
        }

        /* Custom dropdown */
        .dropdown {
            position: relative;
            flex: 1;
            min-width: 0;
        }

        .dropdown-trigger {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: transparent;
            border: 1.5px solid var(--border);
            border-radius: 100px;
            font-family: inherit;
            font-size: 0.875rem;
            color: var(--ink);
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            white-space: nowrap;
            overflow: hidden;
        }

        .dropdown-trigger:hover { border-color: var(--border-hover); }
        .dropdown-trigger:focus, .dropdown.open .dropdown-trigger {
            border-color: var(--ink-soft);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.04);
        }

        .dropdown-trigger .dd-text {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dropdown-trigger .dd-chevron {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            color: var(--ink-faint);
            transition: transform 0.2s;
        }

        .dropdown.open .dd-chevron { transform: rotate(180deg); }

        .dropdown-menu {
            position: absolute;
            bottom: calc(100% + 6px);
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 0.375rem;
            max-height: 240px;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transform: translateY(6px);
            transition: opacity 0.18s, transform 0.18s, visibility 0.18s;
            z-index: 50;
            box-shadow: 0 12px 32px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.05);
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .dropdown-menu::-webkit-scrollbar { width: 4px; }
        .dropdown-menu::-webkit-scrollbar-track { background: transparent; }
        .dropdown-menu::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .dropdown.open .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.625rem;
            border-radius: 10px;
            font-size: 0.875rem;
            color: var(--ink);
            cursor: pointer;
            transition: background 0.15s;
        }

        .dropdown-item:hover { background: var(--border-light); }
        .dropdown-item.selected { background: var(--border-light); font-weight: 500; }

        .dropdown-item .flag {
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* Divider between languages in dropdown */
        .dropdown-divider {
            height: 1px;
            background: var(--border-light);
            margin: 0.25rem 0.5rem;
        }

        /* Echo toggle — pill style to match dropdown */
        .echo-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            padding: 0.5rem 0.75rem;
            border: 1.5px solid var(--border);
            border-radius: 100px;
            transition: border-color 0.2s;
        }

        .echo-toggle:hover { border-color: var(--border-hover); }
        .echo-toggle:focus-within { border-color: var(--ink-soft); box-shadow: 0 0 0 3px rgba(0,0,0,0.04); }

        .echo-toggle input { display: none; }

        .echo-toggle .track {
            width: 30px;
            height: 17px;
            background: var(--border);
            border-radius: 10px;
            position: relative;
            transition: background 0.25s;
            flex-shrink: 0;
        }

        .echo-toggle .track::after {
            content: '';
            position: absolute;
            width: 13px;
            height: 13px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.25s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.15);
        }

        .echo-toggle input:checked + .track {
            background: var(--ink);
        }

        .echo-toggle input:checked + .track::after {
            transform: translateX(13px);
        }

        .echo-toggle .echo-label {
            font-size: 0.8125rem;
            color: var(--ink-soft);
        }

        /* Transcript */
        .transcript-section {
            width: 100%;
            background: var(--surface-raised);
            border: 1px solid var(--border-light);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.02);
        }

        .transcript-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.625rem 0.875rem;
            border-bottom: 1px solid var(--border-light);
        }

        .transcript-header span {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-soft);
            font-weight: 500;
        }

        .transcript {
            max-height: 280px;
            overflow-y: auto;
            padding: 0.75rem;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .transcript::-webkit-scrollbar { width: 4px; }
        .transcript::-webkit-scrollbar-track { background: transparent; }
        .transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .transcript-empty {
            text-align: center;
            color: var(--ink-faint);
            font-size: 0.875rem;
            padding: 2rem 0;
            font-weight: 400;
            font-style: italic;
        }

        .transcript-item {
            margin-bottom: 0.625rem;
            padding: 0.5rem 0.625rem;
            border-radius: 8px;
            animation: msg-in 0.25s ease-out;
        }

        @keyframes msg-in {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .transcript-item.user {
            background: linear-gradient(135deg, #f5f4f1, #efeee9);
            margin-left: 2.5rem;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .transcript-item.assistant {
            background: linear-gradient(135deg, #f0f7f2, #e8f3ea);
            margin-right: 2.5rem;
            border: 1px solid rgba(45,138,78,0.06);
        }

        .transcript-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--ink-soft);
            margin-bottom: 0.2rem;
            font-weight: 500;
        }

        .transcript-text {
            font-size: 0.9375rem;
            line-height: 1.55;
            color: var(--ink);
        }

        /* Powered by */
        .powered-by {
            position: fixed;
            top: 1rem;
            right: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--ink-soft);
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0.7;
            letter-spacing: 0.02em;
        }

        .powered-by svg {
            height: 22px;
            width: auto;
        }

        /* Visualizer canvas — hidden but functional for audio analysis */
        .visualizer-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
        }

        /* Entry animation */
        .container > * {
            animation: fade-up 0.5s ease-out both;
        }
        .container > :nth-child(1) { animation-delay: 0s; }
        .container > :nth-child(2) { animation-delay: 0.08s; }
        .container > :nth-child(3) { animation-delay: 0.16s; }
        .container > :nth-child(4) { animation-delay: 0.24s; }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            body { padding: 1.5rem 1rem; }
            .header h1 { font-size: 2rem; }
            .controls-bar {
                flex-direction: column;
                gap: 0.625rem;
                max-width: 260px;
            }
            .dropdown { width: 100%; }
            .transcript-item.user { margin-left: 1.5rem; }
            .transcript-item.assistant { margin-right: 1.5rem; }
            .powered-by { position: static; margin-top: 2rem; opacity: 0.5; }
        }

        @media (min-height: 800px) {
            .header { margin-bottom: 3rem; }
            .orb-section { margin-bottom: 2.25rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Voice Chat</h1>
            <p>Talk to a traveller from the year 2347</p>
        </div>

        <div class="orb-section">
            <div class="orb-wrap" id="orbWrap">
                <div class="orb-glow"></div>
                <div class="orb-ring"></div>
                <button class="orb-btn" id="orbBtn" aria-label="Start voice chat">
                    <svg id="iconMic" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="22"/>
                    </svg>
                    <svg id="iconStop" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                        <rect x="6" y="6" width="12" height="12" rx="2"/>
                    </svg>
                </button>
            </div>
            <span class="orb-status" id="status" aria-live="polite">Tap to begin</span>
        </div>

        <div class="controls-bar">
            <div class="dropdown" id="voiceDropdown">
                <button class="dropdown-trigger" id="dropdownTrigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                    <span class="dd-text" id="ddText">Loading voices...</span>
                    <svg class="dd-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 6l4 4 4-4"/>
                    </svg>
                </button>
                <div class="dropdown-menu" id="dropdownMenu" role="listbox"></div>
            </div>
            <label class="echo-toggle">
                <input type="checkbox" id="echoCancellation" checked aria-label="Echo cancellation">
                <span class="track"></span>
                <span class="echo-label">Echo cancel</span>
            </label>
        </div>

        <div class="transcript-section">
            <div class="transcript-header">
                <span>Transcript</span>
            </div>
            <div class="transcript" id="transcript">
                <p class="transcript-empty">Your conversation will appear here</p>
            </div>
        </div>
    </div>

    <!-- Hidden canvas for audio analysis -->
    <div class="visualizer-hidden">
        <canvas id="visualizer"></canvas>
    </div>

    <!-- Audio processor scripts -->
    <script src="static/js/opus-encoder.js"></script>
    <script src="static/js/audio-processor.js"></script>
    <script src="static/js/synced-audio-player.js"></script>
    <script>fetch("api/audio-config").then(r=>r.json()).then(c=>{window.__pcmOutput=c.pcm})</script>

    <script>
        const FLAGS = {
            en: '\u{1F1EC}\u{1F1E7}',
            fr: '\u{1F1EB}\u{1F1F7}',
            de: '\u{1F1E9}\u{1F1EA}',
            es: '\u{1F1EA}\u{1F1F8}',
            pt: '\u{1F1E7}\u{1F1F7}'
        };

        // State
        let voices = [];
        let selectedVoice = null;
        let selectedVoiceId = null;
        let selectedVoiceLang = null;
        let ws = null;
        let player = null;
        let isRecording = false;
        let turnBubbles = {};

        // DOM
        const dropdown = document.getElementById('voiceDropdown');
        const ddTrigger = document.getElementById('dropdownTrigger');
        const ddMenu = document.getElementById('dropdownMenu');
        const ddText = document.getElementById('ddText');
        const orbBtn = document.getElementById('orbBtn');
        const orbWrap = document.getElementById('orbWrap');
        const iconMic = document.getElementById('iconMic');
        const iconStop = document.getElementById('iconStop');
        const statusEl = document.getElementById('status');
        const transcript = document.getElementById('transcript');
        const echoCancellationToggle = document.getElementById('echoCancellation');

        // Custom dropdown logic
        function toggleDropdown() {
            const isOpen = dropdown.classList.toggle('open');
            ddTrigger.setAttribute('aria-expanded', isOpen);
        }

        function closeDropdown() {
            dropdown.classList.remove('open');
            ddTrigger.setAttribute('aria-expanded', 'false');
        }

        ddTrigger.addEventListener('click', (e) => { e.stopPropagation(); toggleDropdown(); });
        ddTrigger.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { closeDropdown(); return; }
            const isOpen = dropdown.classList.contains('open');
            if (!isOpen && (e.key === 'ArrowDown' || e.key === 'ArrowUp' || e.key === 'Enter' || e.key === ' ')) {
                e.preventDefault(); toggleDropdown(); return;
            }
            if (!isOpen) return;
            const items = [...ddMenu.querySelectorAll('.dropdown-item')];
            const current = items.findIndex(el => el.dataset.voice === selectedVoice);
            if (e.key === 'ArrowDown') { e.preventDefault(); const next = items[Math.min(current + 1, items.length - 1)]; selectVoice(next.dataset.voice, next.dataset.voiceId); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); const prev = items[Math.max(current - 1, 0)]; selectVoice(prev.dataset.voice, prev.dataset.voiceId); toggleDropdown(); }
            else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); closeDropdown(); }
        });
        document.addEventListener('click', closeDropdown);

        function selectVoice(name, voiceId) {
            selectedVoice = name;
            selectedVoiceId = voiceId || null;
            const v = voices.find(x => x.name === name);
            selectedVoiceLang = v ? v.language : null;
            const voice = voices.find(v => v.name === name);
            const flag = voice ? (FLAGS[voice.language] || '\u{1F310}') : '';
            ddText.textContent = `${flag}  ${name}`;
            ddMenu.querySelectorAll('.dropdown-item').forEach(el => {
                el.classList.toggle('selected', el.dataset.voice === name);
            });
            closeDropdown();
        }

        // Voices
        async function loadVoices() {
            try {
                const response = await fetch('api/voices');
                const data = await response.json();
                voices = data.voices;
                renderVoices();
            } catch (error) {
                console.error('Failed to load voices:', error);
                statusEl.textContent = 'Failed to load voices';
                statusEl.className = 'orb-status error';
            }
        }

        function renderVoices() {
            ddMenu.innerHTML = '';
            let lastLang = null;
            voices.forEach((voice, i) => {
                const flag = FLAGS[voice.language] || '\u{1F310}';
                if (lastLang && voice.language !== lastLang) {
                    const div = document.createElement('div');
                    div.className = 'dropdown-divider';
                    ddMenu.appendChild(div);
                }
                lastLang = voice.language;
                const item = document.createElement('div');
                item.className = 'dropdown-item' + (i === 0 ? ' selected' : '');
                item.dataset.voice = voice.name;
                item.dataset.voiceId = voice.voice_id;
                item.setAttribute('role', 'option');
                item.innerHTML = `<span class="flag">${flag}</span><span>${voice.name}</span>`;
                ddMenu.appendChild(item);
            });
            if (voices.length > 0) selectVoice(voices[0].name, voices[0].voice_id);
        }

        ddMenu.addEventListener('click', (e) => {
            const item = e.target.closest('.dropdown-item');
            if (item) { e.stopPropagation(); selectVoice(item.dataset.voice, item.dataset.voiceId); }
        });

        // Transcript bubbles
        let userBubble = null;
        let hadAssistantBubble = false;

        function getBubbleForTurn(turnIdx, isUser) {
            if (isUser) {
                if (userBubble && !hadAssistantBubble) return userBubble;
                hadAssistantBubble = false;
                userBubble = document.createElement('div');
                userBubble.className = 'transcript-item user';
                userBubble.innerHTML = '<div class="transcript-label">You</div><div class="transcript-text"></div>';
                userBubble._textEl = userBubble.querySelector('.transcript-text');
                transcript.appendChild(userBubble);
                return userBubble;
            }
            let bubble = turnBubbles[turnIdx];
            if (!bubble) {
                hadAssistantBubble = true;
                bubble = document.createElement('div');
                bubble.className = 'transcript-item assistant';
                bubble.innerHTML = '<div class="transcript-label">Assistant</div><div class="transcript-text"></div>';
                bubble._textEl = bubble.querySelector('.transcript-text');
                transcript.appendChild(bubble);
                turnBubbles[turnIdx] = bubble;
            }
            return bubble;
        }

        let scrollRaf = 0;
        function handleText({ text, turnIdx, isUser }) {
            const bubble = getBubbleForTurn(turnIdx, isUser);
            bubble._textEl.textContent += text + ' ';
            if (!scrollRaf) {
                scrollRaf = requestAnimationFrame(() => {
                    transcript.scrollTop = transcript.scrollHeight;
                    scrollRaf = 0;
                });
            }
        }

        // Toggle chat
        function toggleChat() {
            if (isRecording) {
                stopChat();
            } else {
                startChat();
            }
        }

        async function startChat() {
            if (!selectedVoice) {
                statusEl.textContent = 'Select a voice first';
                statusEl.className = 'orb-status error';
                return;
            }

            transcript.innerHTML = '';
            turnBubbles = {};
            userBubble = null;
            hadAssistantBubble = false;

            player = new SyncedAudioPlayer({
                basePath: 'static/js',
                sampleRate: 24000,
                pcmOutput: window.__pcmOutput || false,
                echoCancellation: echoCancellationToggle.checked,
                onEncodedAudio: (opusData) => {
                    if (isRecording && ws && ws.readyState === WebSocket.OPEN) ws.send(opusData);
                },
                onText: handleText,
                onEvent: (eventType, msg) => {
                    console.log('Event:', eventType, msg);
                    if (eventType === 'demo_mode') {
                        statusEl.textContent = 'Demo mode';
                        statusEl.className = 'orb-status';
                    }
                },
                onError: (error) => {
                    console.error('Player error:', error);
                    statusEl.textContent = error.message;
                    statusEl.className = 'orb-status error';
                }
            });

            try {
                await player.start();
            } catch (error) {
                console.error('Failed to setup audio:', error);
                statusEl.textContent = 'Microphone access denied';
                statusEl.className = 'orb-status error';
                return;
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const basePath = window.location.pathname.replace(/\/$/, '');
            ws = new WebSocket(`${protocol}//${window.location.host}${basePath}/ws/chat`);

            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'start', voice_name: selectedVoice, voice_id: selectedVoiceId, language: selectedVoiceLang }));
                isRecording = true;
                orbBtn.classList.add('recording');
                orbWrap.classList.add('active');
                iconMic.style.display = 'none';
                iconStop.style.display = 'block';
                statusEl.textContent = 'Listening';
                statusEl.className = 'orb-status active';
                ddTrigger.disabled = true;
            };

            ws.onmessage = (event) => player.handleMessage(event.data);

            ws.onerror = () => {
                statusEl.textContent = 'Connection error';
                statusEl.className = 'orb-status error';
            };

            ws.onclose = () => {
                resetUI();
                if (statusEl.textContent === 'Listening') {
                    statusEl.textContent = 'Disconnected';
                    statusEl.className = 'orb-status';
                }
            };
        }

        function stopChat() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'stop' }));
                ws.close();
            }
            ws = null;
            if (player) { player.stop(); player = null; }
            resetUI();
            statusEl.textContent = 'Chat ended';
            statusEl.className = 'orb-status';
        }

        function resetUI() {
            isRecording = false;
            orbBtn.classList.remove('recording');
            orbWrap.classList.remove('active');
            iconMic.style.display = 'block';
            iconStop.style.display = 'none';
            ddTrigger.disabled = false;
        }

        orbBtn.addEventListener('click', toggleChat);
        loadVoices();
    </script>
</body>
</html>
