# gradbot_server configuration
#
# Launch with:
#   cargo run -p gradbot_server -- --config gradbot_server/config.example.toml
#
# LLM credentials can be set here or via environment variables
# (LLM_API_KEY, LLM_MODEL, LLM_BASE_URL). Env vars are used as fallback
# when the corresponding field is omitted.

addr = "0.0.0.0"
port = 8080

# gradium_base_url = "https://api.gradium.ai/api"

# --- LLM (omit to use env vars) ---
# llm_api_key = "$LLM_API_KEY"
# llm_base_url = "https://api.openai.com/v1"
# llm_model_name = "gpt-4o"
# max_completion_tokens = 4096

# --- Logging ---
# log_dir = "./logs"
# log_sessions = false

# --- Pinned session config ---
